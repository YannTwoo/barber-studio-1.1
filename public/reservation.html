<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Réservation | AD Barber Studio Perros</title>

<link rel="icon" href="/icons/icon-192.png">

<link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#050505">


<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">


<link rel="stylesheet" href="/css/style.css">

</head>



<body>


<div id="splash">

<div class="logo">
AD BARBER STUDIO
</div>

</div>



<header class="header">


<h1>
AD Barber Studio
</h1>


<nav>

<a href="/">
Accueil
</a>

<a href="/client.html">
Planning
</a>


</nav>



<button id="installBtn" class="btn">
Rejoindre le Club
</button>


</header>





<main class="reservation-page">


<section class="reservation-card">



<div class="hero-subtitle">
RÉSERVATION
</div>



<h2>
Prendre rendez-vous
</h2>



<p class="reservation-description">

Choisissez votre date, votre horaire et votre prestation.

</p>




<form id="reservationForm">





<div class="input-group">

<label>
Nom
</label>


<input 
type="text"
id="nom"
placeholder="Votre nom"
required>

</div>





<div class="input-group">

<label>
Coupe souhaitée
</label>


<input
type="text"
id="coupe"
placeholder="Exemple : Coupe classique"
required>

</div>





<div class="input-group">


<label>
Date
</label>



<div id="calendar" class="calendar"></div>



<select id="date" required hidden>

<option value="">
Choisir une date
</option>


</select>


</div>






<div class="input-group">


<label>
Horaire
</label>



<div class="hours-grid">



<button 
type="button"
class="hour-btn"
data-hour="10:30">

10:30

</button>



<button 
type="button"
class="hour-btn"
data-hour="11:00">

11:00

</button>



<button 
type="button"
class="hour-btn"
data-hour="11:30">

11:30

</button>



<button 
type="button"
class="hour-btn"
data-hour="12:00">

12:00

</button>



<button 
type="button"
class="hour-btn"
data-hour="12:45">

12:45

</button>



<button 
type="button"
class="hour-btn"
data-hour="13:30">

13:30

</button>



</div>




<select id="heure" required hidden>

<option value="">
Choisir un horaire
</option>

</select>



</div>







<div class="input-group">


<label>
Service
</label>



<select id="service" required>


<option value="">
Choisir un service
</option>


<option value="Standard">
Standard
</option>


<option value="+ Barbe">
+ Barbe
</option>


<option value="+ Finition Ciseau">
+ Finition Ciseau
</option>


<option value="+ Barbe & Finition Ciseau">
+ Barbe & Finition Ciseau
</option>


</select>



</div>







<div class="summary">


<h3>
Résumé
</h3>


<p id="resumeDate">
Date : -
</p>


<p id="resumeHeure">
Heure : -
</p>


<p id="resumeService">
Service : -
</p>


<p id="prixService">
Prix : 0€
</p>


</div>







<button 
class="reservation-btn"
type="submit">

Réserver

</button>





</form>



<p id="message"></p>



</section>



</main>






<footer>

<p>
© AD Barber Studio Perros
</p>

</footer>







<script src="/js/reservation.js"></script>



<script>


window.addEventListener("load",()=>{


const splash=document.getElementById("splash");


if(splash){


setTimeout(()=>{

splash.classList.add("hide");

},700);


}


});



</script>



</body>

</html>
