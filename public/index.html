<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AD Barber Studio Perros</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<header class="header">

<h1>AD Barber Studio Perros</h1>

<nav>
<a href="/reservation.html">Réserver</a>
<a href="/client.html">Planning</a>
<a href="/admin.html">Admin</a>
</nav>

</header>

<section class="hero">

<h2>Barber Shop</h2>

<p>Réservez votre coupe en quelques secondes.</p>

<a class="btn" href="/reservation.html">
Réserver un rendez-vous
</a>

</section>

<section class="gallery">

<h2>Avant / Après</h2>

<div class="gallery-grid">

<div class="comparison">

<img src="/images/apres1.jpg" alt="Après" class="after">

<div class="before-wrapper">
<img src="/images/avant1.jpg" alt="Avant" class="before">
</div>

<input type="range" min="0" max="100" value="50" class="slider">

</div>

<div class="comparison">

<img src="/images/apres2.jpg" alt="Après" class="after">

<div class="before-wrapper">
<img src="/images/avant2.jpg" alt="Avant" class="before">
</div>

<input type="range" min="0" max="100" value="50" class="slider">

</div>

</div>

</section>

<footer>
<p>AD Barber Studio Perros</p>
</footer>

<script>

document.querySelectorAll('.comparison').forEach((comparison) => {

const slider = comparison.querySelector('.slider');
const beforeWrapper = comparison.querySelector('.before-wrapper');

slider.addEventListener('input', () => {
beforeWrapper.style.width = slider.value + '%';
});

});

</script>

</body>
</html>
