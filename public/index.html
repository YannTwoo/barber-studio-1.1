<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Barber Studio</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">

  <!-- iPhone support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icon-192.png">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    header {
      padding: 40px 20px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.7;
    }

    #installBtn {
      display: none;
      margin-top: 20px;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #ffffff;
      color: #000;
      cursor: pointer;
    }

    #installBtn:hover {
      background: #ddd;
    }

    .card {
      margin: 30px auto;
      max-width: 400px;
      padding: 20px;
      background: #1a1a1a;
      border-radius: 15px;
    }
  </style>
</head>

<body>

  <header>
    <h1>💈 Barber Studio</h1>
    <p>Réserve ton rendez-vous en un clic</p>

    <button id="installBtn">📱 Installer l'application</button>
  </header>

  <div class="card">
    <h2>Bienvenue 👋</h2>
    <p>Accède à tous les services du salon directement depuis ton application.</p>
  </div>

  <script>
    let deferredPrompt;
    const installBtn = document.getElementById("installBtn");

    // Détecte si installable
    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = "inline-block";
    });

    // Clic sur installer
    installBtn.addEventListener("click", async () => {
      if (!deferredPrompt) return;

      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.style.display = "none";
    });

    // iOS fallback (Apple ne déclenche pas beforeinstallprompt)
    const isIOS = /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());

    if (isIOS) {
      installBtn.style.display = "inline-block";
      installBtn.innerText = "📲 Ajouter à l'écran d'accueil";
      installBtn.onclick = () => {
        alert("Appuie sur Partager → Ajouter à l'écran d'accueil");
      };
    }
  </script>

</body>
</html>
