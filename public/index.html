<!-- GALERIE SLIDER AUTO -->
<section class="gallery">

<h2>Nos Réalisations</h2>

<div class="slider-container">

<img src="/images/coupe1.jpg" class="slide active">
<img src="/images/coupe2.jpg" class="slide">
<img src="/images/coupe3.jpg" class="slide">
<img src="/images/coupe4.jpg" class="slide">

</div>

</section>

<footer>
<p>AD Barber Studio Perros</p>
</footer>

<script>
const slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(() => {
  slides[index].classList.remove("active");

  index = (index + 1) % slides.length;

  slides[index].classList.add("active");
}, 3000);
</script>
