<link rel="stylesheet" href="/css/style.css">

<body>

<!-- SPLASH -->
<div id="splash">
    <div class="logo">AD BARBER STUDIO</div>
</div>

<header class="header">

<nav>

<a href="/client.html">Planning</a>

</nav>

<!-- INSTALL BUTTON -->
<button id="installBtn" class="btn" style="display:none;">
Rejoindre le Club
</button>

</header>

<section class="hero">

<h2>Barber Shop</h2>

<p>Réservez votre coupe en quelques secondes.</p>

<a class="btn" href="/reservation.html">
Réserver un rendez-vous
</a>

</section>

<section class="gallery">

<h2>Galerie</h2>

<div class="slider-container">

<img src="/images/coupe1.jpg" class="slide active" alt="Coupe 1">
<img src="/images/coupe2.jpg" class="slide" alt="Coupe 2">

</div>

</section>

<footer>
<p>AD Barber Studio Perros</p>
</footer>

<!-- SLIDER -->
<script>
const slides = document.querySelectorAll('.slide');
let current = 0;

if (slides.length > 0) {
setInterval(() => {

slides[current].classList.remove('active');

current++;

if (current >= slides.length) current = 0;

slides[current].classList.add('active');

}, 5000);
}
</script>

<!-- PWA INSTALL (FIXED) -->
<script>
let deferredPrompt;
const installBtn = document.getElementById("installBtn");

// Chrome / Android
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;

  installBtn.style.display = "inline-block";
});

// clic bouton install
installBtn.addEventListener("click", async () => {
  if (!deferredPrompt) {
    alert("Installation non disponible ici. Utilise Chrome mobile.");
    return;
  }

  deferredPrompt.prompt();
  const choice = await deferredPrompt.userChoice;

  deferredPrompt = null;
  installBtn.style.display = "none";
});

// iOS fallback (manuel)
const isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());

if (isIOS) {
  installBtn.style.display = "inline-block";
  installBtn.textContent = "Rejoindre le Club";

  installBtn.addEventListener("click", () => {
    alert("Safari → Partager → Ajouter à l’écran d’accueil 📲");
  });
}
</script>

<!-- SPLASH -->
<script>
document.addEventListener("DOMContentLoaded", () => {

    const splash = document.getElementById("splash");

    if (!splash) return;

    setTimeout(() => {
        splash.classList.add("hide");

        setTimeout(() => splash.remove(), 600);

    }, 1600);

});
</script>

</body>
</html>
